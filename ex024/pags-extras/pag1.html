<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Mini Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: #fff;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

  <header>
    <h1>Meu Mini Site</h1>
    <p>Bem-vindo ao meu site simples</p>
  </header>

  <nav>
    <a href="#">Início</a>
    <a href="#">Sobre</a>
    <a href="#">Contato</a>
  </nav>

  <div class="container">
    <div class="card">
      <h2>Início</h2>
      <p>Este é um mini site feito em HTML e CSS.</p>
    </div>

    <div class="card">
      <h2>Sobre</h2>
      <p>Aqui você pode falar sobre você ou seu projeto.</p>
    </div>

    <div class="card">
      <h2>Contato</h2>
      <p>Email: seuemail@email.com</p>
    </div>
  </div>

  <footer>
    <p>© 2026 Meu Site</p>
  </footer>

</body>
</html>
