<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
    }

    header {
      padding: 60px 20px;
      text-align: center;
      background: #000;
    }

    header h1 {
      font-size: 2.5em;
    }

    header p {
      color: #aaa;
    }

    .projects {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .project {
      background: #1c1c1c;
      border-radius: 10px;
      width: 280px;
      overflow: hidden;
      transition: transform 0.3s;
    }

    .project:hover {
      transform: scale(1.05);
    }

    .project img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .project-content {
      padding: 15px;
    }

    .project-content h3 {
      margin-bottom: 10px;
    }

    .project-content p {
      font-size: 0.9em;
      color: #bbb;
    }

    .contact {
      text-align: center;
      padding: 30px;
    }

    .contact a {
      color: #00c6ff;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #000;
      color: #777;
    }
  </style>
</head>
<body>

  <header>
    <h1>Meu Portfólio</h1>
    <p>Desenvolvedor iniciante</p>
  </header>

  <section class="projects">
    <div class="project">
      <img src="https://picsum.photos/300/200?1">
      <div class="project-content">
        <h3>Projeto A</h3>
        <p>Descrição do projeto A.</p>
      </div>
    </div>

    <div class="project">
      <img src="https://picsum.photos/300/200?2">
      <div class="project-content">
        <h3>Projeto B</h3>
        <p>Descrição do projeto B.</p>
      </div>
    </div>

    <div class="project">
      <img src="https://picsum.photos/300/200?3">
      <div class="project-content">
        <h3>Projeto C</h3>
        <p>Descrição do projeto C.</p>
      </div>
    </div>
  </section>

  <div class="contact">
    <p>Entre em contato:</p>
    <a href="#">seuemail@email.com</a>
  </div>

  <footer>
    <p>© 2026 Seu Nome</p>
  </footer>

</body>
</html>
