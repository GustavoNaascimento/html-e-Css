<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexiblos boxes</title>
    <style>
        div.container{
            background-color: chocolate;
            height: 300px;

            display: flex;
            flex-flow: row nowrap;
            align-items: start;
        }
        div.itens{
            background-color: lightgray;
            border: 1px solid black;
            text-align: center;
            padding: 50px;
        }

        div#i1{
            order: 6;
        }
        div#i2{
            order: 0;
        }
        div#i3{
            order: 0;
        }
        div#i4{
            order: -2;
        }
        div#i5{
            order: 0;
        }
        div#i6{
            order: 0;
        }
        div#i7{
            order: -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="itens" id="i1">a</div>
        <div class="itens" id="i2">b</div>
        <div class="itens" id="i3">c</div>
        <div class="itens" id="i4">d</div>
        <div class="itens" id="i5">e</div>
        <div class="itens" id="i6">f</div>
        <div class="itens" id="i7">g</div>
    </div>
</body>
</html>
