<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexiblos boxes</title>
    <style>
        div.container{
            background-color: orange;
            display: flex;
            flex-flow: row wrap-reverse;
        }
        div.itens{
            background-color: lightgray;
            text-align: center;
            flex: auto;
            padding: 15px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="itens">exenplo de a</div>
        <div class="itens">exenplo de b</div>
        <div class="itens">exenplo de c</div>
        <div class="itens">exenplo de d</div>
        <div class="itens">exenplo de e</div>
        <div class="itens">exenplo de f</div>
        <div class="itens">exenplo de g</div>
    </div>
</body>
</html>
