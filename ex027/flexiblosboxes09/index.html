<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexiblos boxes</title>
    <style>
        div.container{
            background-color: chocolate;
            display: flex;
            height: 400px;
            flex-flow: row nowrap;
            align-items: start;
        }
        div.itens{
            background-color: lightgray;
            text-align: center;
            border: 1px solid black;
            padding: 30px;

            flex-basis: auto;
        }
    </style>
</head>
<body>
    <h1>Exemplo de flex-basis</h1>
    <div class="container">
        <div class="itens">a</div>
        <div class="itens">b</div>
        <div class="itens">exemplo de flex basis</div>
        <div class="itens">d</div>
        <div class="itens">e</div>
        <div class="itens">f</div>
        <div class="itens">g</div>
    </div>
</body>
</html>
