<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>TecShope</title>
</head>
<body>
    <main class="container">
        <form action="#" method="get">
            <h1>Bem vindo de volta</h1>
            <p>Seu futuro é aqui!</p>

            <div class="input-login">
                <input type="email" id="campo" placeholder="Username" required>
                <i class="bx bxs-user"></i>
            </div>
            <div class="input-login">
                <input type="password" id="campo-senha" placeholder="Password" required>
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>
                <a href="#">Esqueci a senha</a>
            </div>

            <button type="submit" class="sub-login">Login</button>

            <div class="register-link">
                <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
            </div>
        </form>
    </main>
</body>
</html>
