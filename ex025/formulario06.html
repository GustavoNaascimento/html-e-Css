<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário06</title>
</head>
<body>
    <form action="" method="post">
        <p>
            <label for="icolor">Cor</label>
            <input type="color" name="color" id="icolor">
        </p>
        <p>
            <label for="inivel">Nivel Satisfação</label>
            <input type="range" name="Nivel" id="inivel" min="1" max="5" value="3">
        </p>
        <p>
            <label for="ifoto">Arquivos</label>
            <input type="file" name="foto" id="ifoto">
            <!-- é necessario usar o post-->
        </p> 
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
    </p>
    </form>
</body>
</html>
