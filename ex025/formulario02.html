<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulário02</title>
</head>
<body>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="iusu">Usuário</label>
            <input type="text" name="Usu" id="iusu" required minlength="5" maxlength="10" size="15" placeholder="ex:name" autocomplete="username">
        </p>
        <p>
            <label for="isen">Password</label>
            <input type="password" name="sen" id="isen" required minlength="4" maxlength="15" size="15" placeholder="ex:senha" autocomplete="current-password">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
