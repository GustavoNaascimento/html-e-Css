<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulaario03</title>
</head>
<body>
    <form action="cadastro.php" method="post" autocomplete="off">
        <p>
            <label for="iname">Nome</label>
            <input type="text" name="name" id="iname" required>
        </p>
        <p>
            <label for="inumber">Escolha um Numero</label>
            <input type="number" name="number" id="inumber" min="1" max="10" placeholder="1-10" step="0.5" >
        </p>
        <P>
            <label for="imes">Escolha um Mês</label>
            <input type="month" name="mes" id="imes" value="2026-04">
        </P>
        <p>
            <label for="idia">Escolha um Dia</label>
            <input type="date" name="dia" id="idia" value="2026-04-21">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
        
    </form>
</body>
</html>
