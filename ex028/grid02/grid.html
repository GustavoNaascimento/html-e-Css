<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <style>
        div.container{
            border: 3px solid purple;

            display: grid;
            grid-template: repeat(3, 100px) / repeat(3, 100px);
            place-items: end end;
            place-content: normal center;

            gap: 10px;
        }
        div.itens{
            border: 3px solid rgb(190, 64, 85);
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="itens">A</div>
        <div class="itens">B</div>
        <div class="itens">C</div>
        <div class="itens">D</div>
        <div class="itens">E</div>
        <div class="itens">F</div>
        <div class="itens">G</div>
        <div class="itens">H</div>
    </div>
</body>
</html>
